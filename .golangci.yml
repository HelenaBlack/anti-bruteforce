
run:
  tests: true

linters-settings:
  funlen:
    lines: 120
    statements: 80
  revive:
    rules:
      - name: exported
  depguard:
    rules:
      main:
        files:
          - $all
        allow:
          - $gostd
          - github.com/HelenaBlack/anti-bruteforce
          - github.com/spf13/cobra
          - google.golang.org/grpc
          - github.com/lib/pq
          - github.com/joho/godotenv
          - github.com/stretchr/testify
          - github.com/redis/go-redis/v9

linters:
  disable-all: true
  enable:
    - asciicheck
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - durationcheck
    - errorlint
    - exhaustive
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - govet
    - importas
    - ineffassign
    - lll
    - makezero
    - misspell
    - nestif
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tagliatelle
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - wastedassign
